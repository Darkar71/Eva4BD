# ─────────────────────────────────────────────────────────────────────────────
# devsecops-pipeline.yml — Pipeline DevSecOps para ComercioTech
#
# Se ejecuta automáticamente al hacer push o pull request a main.
# Pasos:
#   1. Instala dependencias
#   2. Ejecuta npm audit para detectar vulnerabilidades en dependencias
#   3. Security gate: bloquea el pipeline si hay vulnerabilidades críticas
# ─────────────────────────────────────────────────────────────────────────────

name: DevSecOps Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  # ── Job 1: Auditoría de seguridad de dependencias ──────────────────────────
  security-audit:
    name: 🔍 Auditoría de dependencias (npm audit)
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Clonar repositorio
        uses: actions/checkout@v4

      - name: ⚙️ Configurar Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'avance4/package-lock.json'

      - name: 📦 Instalar dependencias
        working-directory: avance4
        run: npm install

      - name: 🔒 Auditoría de seguridad
        working-directory: avance4
        # Falla el pipeline si hay vulnerabilidades de nivel "high" o superior
        run: npm audit --audit-level=high

      - name: ✅ Security Gate — reporte de resultado
        if: success()
        run: echo "✅ Sin vulnerabilidades críticas detectadas. Pipeline aprobado."

      - name: ❌ Security Gate — pipeline bloqueado
        if: failure()
        run: echo "❌ Vulnerabilidades críticas detectadas. Pipeline bloqueado."
