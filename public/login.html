<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ComercioTech — Iniciar sesión</title>
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    .login-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      width: 100%;
      background: var(--bg);
    }
    .login-box {
      width: 100%;
      max-width: 360px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      padding: 32px 28px;
    }
    .login-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      justify-content: center;
      margin-bottom: 24px;
    }
    .login-logo .logo-icon { font-size: 26px; }
    .login-logo .logo-text { font-size: 19px; font-weight: 700; color: var(--accent); letter-spacing: -.3px; }
    .login-box h2 { font-size: 15px; font-weight: 600; color: var(--text-soft); text-align: center; margin-bottom: 22px; font-weight: 400; }
    .login-box label {
      display: block;
      font-size: 12.5px;
      color: var(--text-soft);
      margin-bottom: 14px;
    }
    .login-box input {
      width: 100%;
      margin-top: 6px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      padding: 10px 12px;
      font-size: 14px;
      outline: none;
    }
    .login-box input:focus { border-color: var(--accent); }
    .login-btn {
      width: 100%;
      margin-top: 6px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 11px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .login-btn:hover { opacity: .92; }
    .login-error {
      margin-top: 14px;
      font-size: 13px;
      color: var(--danger);
      text-align: center;
      min-height: 16px;
    }
    .login-hint {
      margin-top: 20px;
      font-size: 11.5px;
      color: var(--text-muted);
      text-align: center;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="login-wrapper">
    <div class="login-box">
      <div class="login-logo">
        <span class="logo-icon">🛒</span>
        <span class="logo-text">ComercioTech</span>
      </div>
      <h2>Inicia sesión para continuar</h2>

      <form id="login-form">
        <label>Usuario
          <input type="text" id="usuario" autocomplete="username" placeholder="adminTotal / usuarioDB / usuarioLectura" required />
        </label>
        <label>Contraseña
          <input type="password" id="password" autocomplete="current-password" required />
        </label>
        <button type="submit" class="login-btn">Ingresar</button>
        <div class="login-error" id="login-error"></div>
      </form>

      <div class="login-hint">
        Accesos disponibles: <strong>adminTotal</strong> (completo),
        <strong>usuarioDB</strong> (crear/editar) y
        <strong>usuarioLectura</strong> (solo lectura).
      </div>
    </div>
  </div>

  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const usuario  = document.getElementById('usuario').value.trim();
      const password = document.getElementById('password').value;
      const errorEl  = document.getElementById('login-error');
      errorEl.textContent = '';

      try {
        const res  = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ usuario, password }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Error al iniciar sesión');
        window.location.href = '/';
      } catch (err) {
        errorEl.textContent = err.message;
      }
    });
  </script>
</body>
</html>
